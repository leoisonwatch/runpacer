    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(232,255,71,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 390px;
    padding: 0 18px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #fff 30%, var(--muted) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .header .eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  /* Toggle */
  .toggle-row { display: flex; gap: 8px; }
  .toggle-btn {
    flex: 1; padding: 11px 8px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--card);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s ease; text-align: center;
    -webkit-appearance: none; appearance: none;
  }
  .toggle-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  /* Input card */
  .input-card {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 18px; padding: 16px; position: relative; overflow: hidden;
  }
  .input-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.08), transparent);
  }
  .input-label {
    font-size: 10px; font-weight: 500; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }
  .time-input-row { display: flex; align-items: center; gap: 8px; }
  .time-field { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .time-field label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .time-field input {
    width: 100%; background: var(--input-bg); border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: 'Bebas Neue', sans-serif;
    font-size: 48px; letter-spacing: 2px; text-align: center; padding: 8px 4px;
    outline: none; transition: border-color 0.2s; -webkit-appearance: none; appearance: none;
  }
  .time-field input:focus { border-color: var(--accent); }
  .time-field input::placeholder { color: var(--muted); opacity: 0.5; }
  .colon {
    font-family: 'Bebas Neue', sans-serif; font-size: 48px;
    color: var(--muted); padding-bottom: 4px; margin-top: 16px;
  }
  .unit-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 7px; padding: 4px 10px; font-size: 11px;
    font-weight: 500; color: var(--accent2); margin-top: 10px;
  }

  /* Error */
  .error-msg {
    display: none; color: var(--accent2); font-size: 11px;
    text-align: center; padding: 2px; margin: -4px 0;
  }

  /* Button */
  .convert-btn {
    width: 100%; padding: 15px; background: var(--accent); color: #000;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px;
    border: none; border-radius: 14px; cursor: pointer; transition: all 0.15s ease;
    -webkit-appearance: none; appearance: none;
  }
  .convert-btn:active { transform: scale(0.97); background: #d4e83d; }

  /* Result */
  .result-card {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 18px; padding: 16px 18px;
    opacity: 0; transform: translateY(8px);
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none;
  }
  .result-card.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .result-label { font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  .result-row { display: flex; align-items: center; justify-content: space-between; }

  .result-pace {
    font-family: 'Bebas Neue', sans-serif; font-size: 58px;
    letter-spacing: 2px; color: var(--accent); line-height: 1;
  }
  .result-unit { font-size: 13px; color: var(--muted); }

  .speed-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.2);
    border-radius: 10px; padding: 8px 12px;
  }
  .speed-value {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    color: var(--accent2); line-height: 1; letter-spacing: 1px;
  }
  .speed-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  /* Zones */
  .zones-row { display: flex; gap: 5px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .zone-chip {
    flex: 1; background: var(--input-bg); border-radius: 8px;
    padding: 6px 2px; text-align: center; border: 1px solid var(--border);
  }
  .zone-chip.highlighted { border-color: var(--accent); background: rgba(232,255,71,0.06); }
  .zone-chip .zspeed { font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: var(--text); letter-spacing: 0.5px; }
  .zone-chip .zpace { font-size: 8px; color: var(--muted); }
  .zone-chip.highlighted .zspeed { color: var(--accent); }
  .zones-title { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="eyebrow">Run Tool</div>
      <h1>PACE CONVERTER</h1>
    </div>
  </div>

  <!-- Toggle -->
  <div class="toggle-row">
    <button class="toggle-btn active" id="btn-mi" onclick="setMode('mi')">Mile → KM</button>
    <button class="toggle-btn" id="btn-km" onclick="setMode('km')">KM → Mile</button>
  </div>

  <!-- Input -->
  <div class="input-card">
    <div class="input-label" id="input-label">Mil Temposu Gir</div>
    <div class="time-input-row">
      <div class="time-field">
        <label>DAK</label>
        <input type="tel" id="minutes" placeholder="00" maxlength="2" inputmode="numeric" pattern="[0-9]*">
      </div>
      <div class="colon">:</div>
      <div class="time-field">
        <label>SAN</label>
        <input type="tel" id="seconds" placeholder="00" maxlength="2" inputmode="numeric" pattern="[0-9]*">
      </div>
    </div>
    <div class="unit-badge">
      <span>📍</span>
      <span id="unit-text">min / mil</span>
    </div>
  </div>

  <div class="error-msg" id="error-msg">Geçerli bir tempo gir</div>

  <!-- Button -->
  <button class="convert-btn" onclick="convert()">ÇEVİR</button>

  <!-- Result -->
  <div class="result-card" id="result-card">
    <div class="result-label" id="result-label">KM Temposu</div>
    <div class="result-row">
      <div>
        <div class="result-pace" id="result-pace">—</div>
        <div class="result-unit" id="result-unit">/km</div>
      </div>
      <div class="speed-pill">
        <div>
          <div class="speed-value" id="result-speed">—</div>
          <div class="speed-label">km/saat</div>
        </div>
      </div>
    </div>
    <div class="zones-title" style="margin-top:10px">Yakın Tempolar</div>
    <div class="zones-row" id="zones-row"></div>
  </div>

</div>

<script>
  var mode = 'mi';

  function setMode(m) {
    mode = m;
    document.getElementById('btn-mi').classList.toggle('active', m === 'mi');
    document.getElementById('btn-km').classList.toggle('active', m === 'km');
    document.getElementById('input-label').textContent = m === 'mi' ? 'Mil Temposu Gir' : 'KM Temposu Gir';
    document.getElementById('unit-text').textContent = m === 'mi' ? 'min / mil' : 'min / km';
    document.getElementById('minutes').value = '';
    document.getElementById('seconds').value = '';
    document.getElementById('result-card').classList.remove('visible');
    hideError();
  }

  function showError(msg) {
    var el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-msg').style.display = 'none';
  }

  function padTwo(n) {
    return String(Math.floor(n)).padStart(2, '0');
  }

  function secondsToMMSS(totalSeconds) {
    var m = Math.floor(totalSeconds / 60);
    var s = Math.round(totalSeconds % 60);
    if (s === 60) { m++; s = 0; }
    return padTwo(m) + ':' + padTwo(s);
  }

  function convert() {
    hideError();
    var minRaw = document.getElementById('minutes').value.replace(/[^0-9]/g, '');
    var secRaw = document.getElementById('seconds').value.replace(/[^0-9]/g, '');

    if (minRaw === '' && secRaw === '') { showError('Dakika veya saniye gir'); return; }
    var min = minRaw === '' ? 0 : parseInt(minRaw, 10);
    var sec = secRaw === '' ? 0 : parseInt(secRaw, 10);
    if (sec >= 60) { showError('Saniye 0-59 arasında olmalı'); return; }
    if (min === 0 && sec === 0) { showError('Tempo 00:00 olamaz'); return; }

    var totalSeconds = min * 60 + sec;
    var MI_TO_KM = 1.60934;
    var convertedSec, speedKmh;

    if (mode === 'mi') {
      convertedSec = totalSeconds / MI_TO_KM;
      speedKmh = (3600 / totalSeconds) * MI_TO_KM;
      document.getElementById('result-label').textContent = 'KM Temposu';
      document.getElementById('result-unit').textContent = '/km';
    } else {
      convertedSec = totalSeconds * MI_TO_KM;
      speedKmh = 3600 / totalSeconds;
      document.getElementById('result-label').textContent = 'Mil Temposu';
      document.getElementById('result-unit').textContent = '/mil';
    }

    document.getElementById('result-pace').textContent = secondsToMMSS(convertedSec);
    document.getElementById('result-speed').textContent = speedKmh.toFixed(1) + ' km/s';
    buildZones(totalSeconds);
    document.getElementById('result-card').classList.add('visible');
  }

  function buildZones(centerSec) {
    var MI_TO_KM = 1.60934;
    var container = document.getElementById('zones-row');
    container.innerHTML = '';
    var steps = [-60, -30, 0, 30, 60];
    steps.forEach(function(delta) {
      var inputSec = centerSec + delta;
      if (inputSec <= 0) return;
      var converted = mode === 'mi' ? inputSec / MI_TO_KM : inputSec * MI_TO_KM;
      var speed = mode === 'mi' ? (3600 / inputSec) * MI_TO_KM : 3600 / inputSec;
      var chip = document.createElement('div');
      chip.className = 'zone-chip' + (delta === 0 ? ' highlighted' : '');
      chip.innerHTML = '<div class="zspeed">' + secondsToMMSS(converted) + '</div><div class="zpace">' + speed.toFixed(1) + ' km/s</div>';
      container.appendChild(chip);
    });
  }

  ['minutes', 'seconds'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g, '').slice(0, 2);
    });
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') convert();
  });
</script>
</body>
</html>
